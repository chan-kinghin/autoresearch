name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to CVM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Deploy autoresearch
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.CVM_HOST }}
          username: ${{ secrets.CVM_USER }}
          key: ${{ secrets.CVM_SSH_KEY }}
          timeout: 300s
          script: |
            cd /opt/ops/apps/autoresearch/prod
            git fetch origin main
            git reset --hard origin/main

            # One-time migration: copy old research-data volume to new split volumes
            if docker volume inspect prod_research-data >/dev/null 2>&1; then
              echo "Migrating old research-data volume..."
              docker run --rm \
                -v prod_research-data:/old \
                -v prod_research-runs:/new \
                alpine sh -c "cp -a /old/. /new/ 2>/dev/null || true"
              echo "Migration done. Old volume preserved as prod_research-data."
            fi

            docker compose build --no-cache
            docker compose up -d
            echo "Deploy complete: $(date)"
